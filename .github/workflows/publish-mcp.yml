name: Publish @chartroom/mcp

on:
  push:
    tags:
      - "mcp-v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: chartroom_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U test -d chartroom_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - run: bun install --frozen-lockfile

      - name: Build renderer bundle
        run: bun run --filter @chartroom/renderer build:bundle

      - name: Build MCP
        run: bun run --filter @chartroom/mcp build

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5433/chartroom_test

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/mcp-v}
          cd packages/mcp
          npm version $VERSION --no-git-tag-version

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish
        run: cd packages/mcp && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
